<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Recipe App</title>
    <link rel="stylesheet" href="dist/style.css?v=20260428b" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div id="toastContainer" class="toast-container" aria-live="polite" aria-relevant="additions"></div>
    <div id="startupLoader" class="startup-loader" role="status" aria-live="polite">
      <div class="startup-loader__spinner" aria-hidden="true"></div>
      <p>Loading Storecipe...</p>
    </div>

    <main id="appRoot" class="app" aria-busy="true" aria-hidden="true" hidden>
      <header class="app__header">
        <div class="app__header-top">
          <h1>Storecipe</h1>
          <div class="app__header-tools">
            <button id="openShoppingList" class="button button--secondary app__tool-button hidden" type="button" title="Open shopping list" aria-label="Open shopping list">
              <span aria-hidden="true">&#128722;</span>
              <span class="app__tool-button-label">Shopping</span>
            </button>
            <button id="openMealPlanner" class="button button--secondary app__tool-button hidden" type="button" title="Open meal planner" aria-label="Open meal planner">
              <span aria-hidden="true">&#128197;</span>
              <span class="app__tool-button-label">Planner</span>
            </button>
            <button
              id="settingsButton"
              class="button button--secondary app__settings-button hidden"
              type="button"
              aria-expanded="false"
              aria-controls="authPanel"
            >
              Settings
            </button>
          </div>
        </div>
        <!-- <p>Store and find your favorite recipes.</p> -->
        <p id="appStatus" class="app-status" aria-live="polite"></p>
      </header>

      <section id="authPanel" class="panel panel--auth" aria-labelledby="authPanelTitle">
        <div class="panel__title-row">
          <h2 id="authPanelTitle">Account</h2>
          <button
            id="closeSettingsButton"
            class="icon-button button--ghost settings-close-button hidden"
            type="button"
            aria-label="Close settings"
          >
            x
          </button>
        </div>
        <p id="authStatus" class="auth-status">Sign into your account or create new account.</p>
        <form id="authForm">
          <label for="authEmail">Email</label>
          <input id="authEmail" name="email" type="email" autocomplete="email" required />

          <label for="authPassword">Password</label>
          <input
            id="authPassword"
            name="password"
            type="password"
            autocomplete="current-password"
            minlength="8"
            required
          />

          <label for="authConfirmPassword" class="hidden">Confirm Password</label>
          <input
            id="authConfirmPassword"
            name="confirmPassword"
            type="password"
            autocomplete="new-password"
            minlength="8"
            class="hidden"
            placeholder="Confirm password"
          />
          <div id="passwordRequirements" class="password-requirements hidden" aria-live="polite"></div>

          <div class="auth-actions">
            <button id="signInButton" class="button" type="submit">Sign In</button>
            <button id="signUpButton" class="button button--secondary" type="button">Sign Up</button>
            <button id="themeToggleButton" class="button button--ghost theme-toggle-button hidden" type="button">
              Dark theme: Off
            </button>
            <p id="signedInEmail" class="auth-signed-email hidden"></p>
            <button id="signOutButton" class="button button--ghost hidden" type="button">Sign Out</button>
            <div id="authLoading" class="auth-loading hidden" aria-live="polite">
              <span class="auth-loading__spinner" aria-hidden="true"></span>
              <span id="authLoadingText">Signing in...</span>
            </div>
          </div>
        </form>
      </section>
      <div id="settingsBackdrop" class="settings-backdrop hidden" aria-hidden="true"></div>

      <section class="panel panel--search">
        <h2><label for="searchInput">Search Recipes</label></h2>
        <input id="searchInput" type="text" placeholder="Search by title..." />
        <div class="search-filters">
          <select id="categoryFilter" aria-label="Filter by category">
            <option value="">All categories</option>
            <option value="breakfast">Breakfast</option>
            <option value="lunch">Lunch</option>
            <option value="dinner">Dinner</option>
            <option value="soups">Soups</option>
            <option value="snack">Snack</option>
            <option value="dessert">Dessert</option>
            <option value="drinks">Drinks</option>
            <option value="other">Other</option>
          </select>
          <button id="favouritesFilter" class="button button--ghost" type="button" aria-pressed="false" title="Show favourites only">&#9825; Favourites</button>
          <select id="sortSelect" aria-label="Sort recipes">
            <option value="created_at_desc">Newest first</option>
            <option value="created_at_asc">Oldest first</option>
            <option value="title_asc">Name (A–Z)</option>
            <option value="title_desc">Name (Z–A)</option>
            <option value="difficulty_asc">Easiest first</option>
            <option value="difficulty_desc">Hardest first</option>
          </select>
        </div>
      </section>

      <section class="panel panel--list">
        <div class="panel__title-row">
          <h2>Recipe List</h2>
          <button
            id="toggleAddRecipe"
            class="icon-button"
            type="button"
            aria-label="Show Add Recipe"
            aria-expanded="false"
          >
            +
          </button>
        </div>
        <div id="recipeListLoading" class="recipe-list-loading hidden" aria-live="polite" aria-busy="true">
          <article class="recipe-list-skeleton" aria-hidden="true">
            <div class="recipe-list-skeleton__image"></div>
            <div class="recipe-list-skeleton__body">
              <div class="recipe-list-skeleton__line recipe-list-skeleton__line--title"></div>
              <div class="recipe-list-skeleton__line recipe-list-skeleton__line--meta"></div>
              <div class="recipe-list-skeleton__button"></div>
            </div>
          </article>
          <article class="recipe-list-skeleton" aria-hidden="true">
            <div class="recipe-list-skeleton__image"></div>
            <div class="recipe-list-skeleton__body">
              <div class="recipe-list-skeleton__line recipe-list-skeleton__line--title"></div>
              <div class="recipe-list-skeleton__line recipe-list-skeleton__line--meta"></div>
              <div class="recipe-list-skeleton__button"></div>
            </div>
          </article>
        </div>
        <div id="recipeList" class="recipe-list"></div>
      </section>

      <section id="addRecipeSection" class="panel panel--form hidden">
        <h2 id="recipeFormHeading">Add Recipe</h2>
        <form id="recipeForm">
          <label for="title">Title</label>
          <input id="title" name="title" type="text" required />

          <label for="description">Description (optional)</label>
          <textarea id="description" name="description" rows="3" placeholder="A short summary shown on the recipe card"></textarea>

          <label for="category">Category</label>
          <select id="category" name="category">
            <option value="">None</option>
            <option value="breakfast">Breakfast</option>
            <option value="lunch">Lunch</option>
            <option value="dinner">Dinner</option>
            <option value="soups">Soups</option>
            <option value="snack">Snack</option>
            <option value="dessert">Dessert</option>
            <option value="drinks">Drinks</option>
            <option value="other">Other</option>
          </select>

          <label for="recipeImportUrl" class="sr-only">Import from recipe link</label>
          <div class="recipe-import-tools hidden">
            <div class="recipe-import-tools__row">
              <input
                id="recipeImportUrl"
                name="recipeImportUrl"
                type="text"
                placeholder="Paste recipe URL (https://...)"
                autocomplete="off"
                inputmode="url"
              />
              <button id="importRecipeButton" type="button" class="button button--secondary recipe-import-tools__button">
                Import
              </button>
            </div>
            <label for="recipeImportPrompt" class="recipe-import-tools__prompt-label">Import prompt</label>
            <textarea
              id="recipeImportPrompt"
              name="recipeImportPrompt"
              class="recipe-import-tools__prompt"
              rows="5"
              placeholder="Prompt used to structure extracted recipe text"
            ></textarea>
            <div class="recipe-import-tools__actions">
              <button
                id="resetImportPromptButton"
                type="button"
                class="button button--ghost recipe-import-tools__button recipe-import-tools__button--small"
              >
                Reset prompt
              </button>
            </div>
          </div>

          <label for="image">Image</label>
          <input id="image" name="image" type="file" accept="image/*" class="hidden" />
          <div id="editImageTools" class="edit-image-tools">
            <div class="edit-image-tools__row">
              <img id="editImagePreview" class="edit-image-tools__preview hidden" alt="Recipe image preview" />
              <p id="editImageEmpty" class="edit-image-tools__empty">No image selected.</p>
              <div class="edit-image-tools__actions">
                <div class="edit-image-tools__upload-row">
                  <button
                    id="chooseImageButton"
                    type="button"
                    class="button button--secondary edit-image-tools__button edit-image-tools__button--upload"
                  >
                    Upload new image
                  </button>
                  <input id="imageUrlInput" type="url" class="edit-image-tools__url-input" placeholder="Or paste image URL" />
                </div>
                <button id="clearImageButton" type="button" class="button button--ghost edit-image-tools__button">
                  Delete image
                </button>
                <button id="undoImageButton" type="button" class="button button--ghost edit-image-tools__button">
                  Undo
                </button>
              </div>
            </div>
          </div>

          <label for="ingredients">Ingredients</label>
          <textarea id="ingredients" name="ingredients" rows="4" required></textarea>

          <label for="method">Method</label>
          <textarea id="method" name="method" rows="6" required></textarea>

          <label for="notes">Notes / Tips (optional)</label>
          <textarea id="notes" name="notes" rows="3"></textarea>

          <label>Prep Time</label>
          <div class="time-input-row">
            <input
              id="prepHours"
              name="prepHours"
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              placeholder="Hours"
              aria-label="Prep time hours"
            />
            <input
              id="prepMinutes"
              name="prepMinutes"
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              placeholder="Minutes"
              aria-label="Prep time minutes"
            />
          </div>
          <p id="prepTimeWarning" class="time-warning hidden" aria-live="polite"></p>

          <label>Cooking Time</label>
          <div class="time-input-row">
            <input
              id="cookHours"
              name="cookHours"
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              placeholder="Hours"
              aria-label="Cooking time hours"
            />
            <input
              id="cookMinutes"
              name="cookMinutes"
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              placeholder="Minutes"
              aria-label="Cooking time minutes"
            />
          </div>
          <p id="cookTimeWarning" class="time-warning hidden" aria-live="polite"></p>

          <label for="totalTime">Total Time</label>
          <input id="totalTime" name="totalTime" type="text" readonly />

          <label for="serves">Serves</label>
          <input id="serves" name="serves" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="e.g. 4" />
          <p id="servesWarning" class="time-warning hidden" aria-live="polite"></p>

          <label for="difficulty">Difficulty</label>
          <div class="difficulty-row">
            <input id="difficulty" name="difficulty" type="range" min="1" max="10" step="1" value="4" />
            <span id="difficultyValue" class="difficulty-value">4</span>
          </div>

          <div class="form-actions">
            <button id="saveRecipeButton" type="submit">Save Recipe</button>
            <button id="cancelEditButton" class="button button--ghost hidden" type="button">Cancel editing</button>
          </div>
        </form>
      </section>

      <section id="recipeDetail" class="panel panel--detail hidden" aria-live="polite">
        <button id="closeDetail" class="button button--secondary" type="button">Back to List</button>
        <div id="detailContent"></div>
      </section>

      <!-- Shopping list modal moved outside main for global access -->

      <div id="mealPlannerModal" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal meal-planner-modal" role="dialog" aria-labelledby="mealPlannerTitle">
          <div class="modal__header">
            <h2 id="mealPlannerTitle">Meal Planner</h2>
            <button id="closeMealPlanner" class="icon-button button--ghost" type="button" aria-label="Close meal planner">x</button>
          </div>
          <div class="modal__body">
            <div class="meal-planner__week-nav">
              <button id="mealPlannerPrevWeek" class="button button--ghost" type="button" aria-label="Previous week">&laquo; Prev</button>
              <span id="mealPlannerWeekLabel" class="meal-planner__week-label"></span>
              <button id="mealPlannerNextWeek" class="button button--ghost" type="button" aria-label="Next week">Next &raquo;</button>
            </div>
            <p class="meal-planner__hint">Click any day to add a meal.</p>
            <div id="mealPlannerGrid" class="meal-planner__grid"></div>
          </div>
          <div class="modal__footer">
            <button id="clearMealPlanner" class="button button--ghost" type="button">Clear Week</button>
          </div>
        </div>
      </div>
    </main>

    <button id="floatingShoppingList" class="floating-shopping-btn hidden" type="button" aria-label="Open shopping list" title="Shopping List">&#128722;<span id="floatingShoppingCount" class="floating-shopping-btn__count hidden">0</span></button>

    <div id="shoppingListModal" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal shopping-list-modal" role="dialog" aria-labelledby="shoppingListTitle">
        <div class="modal__header">
          <h2 id="shoppingListTitle">Shopping List</h2>
          <button id="closeShoppingList" class="icon-button button--ghost" type="button" aria-label="Close shopping list">x</button>
        </div>
        <div class="modal__body">
          <p id="shoppingListEmpty" class="empty">No recipes selected. Use the "+ Shopping List" button on a recipe to add ingredients.</p>
          <div id="shoppingListRecipes" class="shopping-list__recipes hidden"></div>
          <ul id="shoppingListItems" class="shopping-list__items hidden"></ul>
        </div>
        <div class="modal__footer">
          <button id="clearShoppingList" class="button button--ghost" type="button">Clear All</button>
          <button id="copyShoppingList" class="button button--secondary" type="button">Copy to Clipboard</button>
        </div>
      </div>
    </div>

    <script src="src/js/core/config.js" onerror="this.remove()"></script>
    <script defer src="src/js/core/constants.js"></script>
    <script defer src="src/js/core/domRefs.js"></script>
    <script defer src="src/js/core/helpers.js"></script>
    <script defer src="src/js/core/ingredientParser.js"></script>
    <script defer src="src/js/core/appState.js"></script>
    <script defer src="src/js/features/imageManager.js"></script>
    <script defer src="src/js/features/settingsManager.js"></script>
    <script defer src="src/js/features/authUiManager.js"></script>
    <script defer src="src/js/features/themeManager.js"></script>
    <script defer src="src/js/features/viewManager.js"></script>
    <script defer src="src/js/features/inlineEditManager.js"></script>
    <script defer src="src/js/features/importPromptManager.js"></script>
    <script defer src="src/js/features/recipeMetaManager.js"></script>
    <script defer src="src/js/features/recipeRenderer.js"></script>
    <script defer src="src/js/services/supabaseServices.js"></script>
    <script defer src="app.js?v=20260428b"></script>
  </body>
</html>
